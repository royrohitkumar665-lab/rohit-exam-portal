<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
</head>
<body>

<h2>Firebase Connection Test</h2>

<button id="testBtn">Test Firebase</button>

<p id="status">Not Connected</p>

<script type="module">

import { db } from "./firebase.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

alert("Firebase Loaded");

document.getElementById("testBtn").onclick = async function () {

    try {

        await addDoc(collection(db, "test"), {
            message: "Hello Firebase"
        });

        document.getElementById("status").innerText = "✅ Connected";

    } catch (e) {

    alert(
        "Code: " + e.code + "\n\nMessage: " + e.message
    );

    document.getElementById("status").innerText =
        e.code + " : " + e.message;

}

};

</script>

</body>
</html>
