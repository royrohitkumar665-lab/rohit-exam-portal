<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit Exam Portal</title>

</head>

<body>

</header>

<div class="home-container">

</div>

<div class="card">

<h2>Admin Login</h2>

Login
</button>

</div>

</div>

© 2026 Rohit Exam Portal

</footer>
